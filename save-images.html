<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>保存图片</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 40px; max-width: 800px; margin: 0 auto; }
    .image-box { margin: 30px 0; padding: 20px; border: 2px dashed #ccc; border-radius: 8px; }
    img { max-width: 300px; border: 1px solid #ddd; }
    button { padding: 10px 20px; background: #D4AF37; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
    button:hover { background: #B8962E; }
    .path { background: #f5f5f5; padding: 8px; border-radius: 4px; font-family: monospace; margin: 10px 0; }
  </style>
</head>
<body>
  <h1>图片保存工具</h1>
  <p>请右键点击图片，选择"图片另存为"，保存到指定路径：</p>
  
  <div class="image-box">
    <h3>1. 书籍封面 - 《让你的设计被看见》</h3>
    <p>保存路径：<span class="path">C:\Users\Administrator\WorkBuddy\国际设计大奖参赛咨询\website\public\images\book-cover.jpg</span></p>
    <img id="img1" src="" alt="书籍封面">
    <br><br>
    <button onclick="downloadImg('img1', 'book-cover.jpg')">下载图片</button>
  </div>

  <div class="image-box">
    <h3>2. 报告封面 - 《垂直领域创意灵感和设计方法参考报告》</h3>
    <p>保存路径：<span class="path">C:\Users\Administrator\WorkBuddy\国际设计大奖参赛咨询\website\public\images\report-cover.jpg</span></p>
    <img id="img2" src="" alt="报告封面">
    <br><br>
    <button onclick="downloadImg('img2', 'report-cover.jpg')">下载图片</button>
  </div>

  <script>
    // 这里需要填入图片的 base64 数据或 URL
    // 由于我无法直接获取图片数据，您需要手动右键保存
    
    function downloadImg(imgId, filename) {
      const img = document.getElementById(imgId);
      const link = document.createElement('a');
      link.href = img.src;
      link.download = filename;
      link.click();
    }
    
    alert('请直接将聊天中的图片拖拽到桌面，然后复制到指定文件夹。\n\n目标路径：\nwebsite/public/images/');
  </script>
</body>
</html>
