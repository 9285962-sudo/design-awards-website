<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>参赛策略 | 设计能—国际设计大奖申报指南</title>
  <meta name="description" content="国际设计大奖申报攻略，从选奖策略到材料准备，专业团队分享200+成功案例经验，助你提高获奖率。">
  
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    :root {
      --primary-gold: #B8860B;
      --primary-gold-light: #D4AF37;
      --bg-dark: #1A1A1A;
      --bg-darker: #0F0F0F;
      --bg-gray: #2C2C2C;
      --bg-content: #252525;
      --text-light: #FAF9F6;
      --text-gray: #AAAAAA;
      --border-gold: rgba(184, 134, 11, 0.3);
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background-color: var(--bg-darker);
      color: #FAF9F6;
      line-height: 1.6;
    }
    
    /* Header */
    .header {
      background-color: rgba(26, 26, 26, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border-gold);
      padding: 16px 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }
    
    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .logo {
      display: flex;
      align-items: baseline;
      gap: 12px;
      text-decoration: none;
    }
    
    .logo-text {
      font-size: 24px;
      font-weight: bold;
      color: #D4AF37;
    }
    
    .logo-sub {
      font-size: 13px;
      color: #888;
    }
    
    .nav {
      display: flex;
      gap: 32px;
    }
    
    .nav a {
      color: #AAAAAA;
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
    }
    
    .nav a:hover, .nav a.active {
      color: #D4AF37;
    }
    
    /* Page Header */
    .page-header {
      background: linear-gradient(135deg, rgba(212, 175, 55, 0.1) 0%, rgba(184, 134, 11, 0.05) 100%);
      border-bottom: 1px solid var(--border-gold);
      padding: 60px 0;
      text-align: center;
    }
    
    .page-label {
      color: #D4AF37;
      font-size: 14px;
      letter-spacing: 2px;
      margin-bottom: 12px;
      text-transform: uppercase;
    }
    
    .page-title {
      font-size: 36px;
      font-weight: bold;
      color: #FAF9F6;
      margin-bottom: 12px;
    }
    
    .page-subtitle {
      font-size: 16px;
      color: #888;
    }
    
    /* Filter Bar */
    .filter-section {
      background-color: var(--bg-gray);
      border-bottom: 1px solid #333;
      padding: 24px 0;
    }
    
    .filter-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    
    .filter-label {
      font-size: 14px;
      color: #888;
      margin-right: 8px;
    }
    
    .filter-btn {
      padding: 8px 16px;
      background-color: var(--bg-dark);
      border: 1px solid #444;
      border-radius: 20px;
      font-size: 13px;
      color: #AAA;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .filter-btn:hover {
      border-color: var(--border-gold);
      color: #D4AF37;
    }
    
    .filter-btn.active {
      background-color: rgba(212, 175, 55, 0.15);
      border-color: #D4AF37;
      color: #D4AF37;
    }
    
    /* Article Grid */
    .section {
      padding: 60px 0;
    }
    
    .article-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 32px;
    }
    
    .article-card {
      background-color: var(--bg-gray);
      border: 1px solid #333;
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s;
      cursor: pointer;
    }
    
    .article-card:hover {
      transform: translateY(-4px);
      border-color: var(--border-gold);
    }
    
    .article-image {
      height: 200px;
      background: linear-gradient(135deg, #3a3a3a 0%, #2C2C2C 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
      font-size: 14px;
      position: relative;
    }
    
    .article-category {
      position: absolute;
      top: 16px;
      left: 16px;
      background-color: rgba(212, 175, 55, 0.9);
      color: #1A1A1A;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
    }
    
    .article-content {
      padding: 24px;
    }
    
    .article-meta {
      display: flex;
      gap: 16px;
      margin-bottom: 12px;
      font-size: 13px;
      color: #888;
    }
    
    .article-meta span {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    
    .difficulty-badge {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
    }
    
    .difficulty-easy {
      background-color: rgba(76, 175, 80, 0.2);
      color: #4CAF50;
    }
    
    .difficulty-medium {
      background-color: rgba(255, 152, 0, 0.2);
      color: #FF9800;
    }
    
    .difficulty-hard {
      background-color: rgba(244, 67, 54, 0.2);
      color: #F44336;
    }
    
    .article-title {
      font-size: 18px;
      font-weight: bold;
      color: #FAF9F6;
      margin-bottom: 12px;
      line-height: 1.4;
    }
    
    .article-summary {
      font-size: 14px;
      color: #888;
      line-height: 1.6;
      margin-bottom: 16px;
    }
    
    .article-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 16px;
      border-top: 1px solid #444;
    }
    
    .article-tags {
      display: flex;
      gap: 8px;
    }
    
    .article-tag {
      padding: 4px 10px;
      background-color: var(--bg-dark);
      border-radius: 4px;
      font-size: 12px;
      color: #888;
    }
    
    .article-link {
      color: #D4AF37;
      text-decoration: none;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    
    .article-link:hover {
      text-decoration: underline;
    }
    
    /* Featured Article */
    .featured-article {
      grid-column: span 2;
      display: grid;
      grid-template-columns: 1fr 1fr;
      background-color: var(--bg-gray);
      border: 1px solid var(--border-gold);
      border-radius: 12px;
      overflow: hidden;
    }
    
    .featured-article .article-image {
      height: 100%;
      min-height: 300px;
    }
    
    .featured-article .article-content {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 40px;
    }
    
    .featured-label {
      display: inline-block;
      background-color: rgba(212, 175, 55, 0.15);
      color: #D4AF37;
      padding: 6px 14px;
      border-radius: 4px;
      font-size: 12px;
      margin-bottom: 16px;
      width: fit-content;
    }
    
    .featured-article .article-title {
      font-size: 24px;
      margin-bottom: 16px;
    }
    
    .featured-article .article-summary {
      font-size: 15px;
      margin-bottom: 24px;
    }
    
    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 80px 0;
      color: #666;
    }
    
    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    
    /* Footer */
    .footer {
      background-color: #0F0F0F;
      padding: 60px 0 32px;
      border-top: 1px solid var(--border-gold);
    }
    
    .footer-content {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      gap: 40px;
      margin-bottom: 40px;
    }
    
    .footer-logo {
      font-size: 24px;
      font-weight: bold;
      color: #D4AF37;
      margin-bottom: 16px;
    }
    
    .footer-desc {
      font-size: 14px;
      color: #888;
      line-height: 1.6;
    }
    
    .footer-title {
      font-size: 14px;
      font-weight: bold;
      color: #FAF9F6;
      margin-bottom: 16px;
    }
    
    .footer-links {
      list-style: none;
    }
    
    .footer-links li {
      margin-bottom: 10px;
    }
    
    .footer-links a {
      color: #888;
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
    }
    
    .footer-links a:hover {
      color: #D4AF37;
    }
    
    .footer-bottom {
      text-align: center;
      padding-top: 32px;
      border-top: 1px solid #333;
      font-size: 13px;
      color: #666;
    }
    
    /* Responsive */
    @media (max-width: 1024px) {
      .article-grid {
        grid-template-columns: 1fr;
      }
      
      .featured-article {
        grid-column: span 1;
        grid-template-columns: 1fr;
      }
      
      .featured-article .article-image {
        min-height: 200px;
      }
      
      .footer-content {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    
    @media (max-width: 768px) {
      .nav {
        display: none;
      }
      
      .page-title {
        font-size: 28px;
      }
      
      .filter-bar {
        gap: 8px;
      }
      
      .filter-btn {
        padding: 6px 12px;
        font-size: 12px;
      }
      
      .footer-content {
        grid-template-columns: 1fr;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="container">
      <div class="header-content">
        <a href="index.html" class="logo">
          <span class="logo-text">设计能</span>
          <span class="logo-sub">国际设计大奖申报指南</span>
        </a>
        <nav class="nav">
          <a href="index.html">首页</a>
          <a href="index.html#awards">奖项库</a>
          <a href="compare.html">奖项对比</a>
          <a href="cases.html">成功案例</a>
          <a href="strategies.html" class="active">参赛策略</a>
          <a href="news.html">赛事新闻</a>
          <a href="index.html#contact">联系我们</a>
        </nav>
      </div>
    </div>
  </header>

  <!-- Page Header -->
  <section class="page-header">
    <div class="container">
      <div class="page-label">Strategies</div>
      <h1 class="page-title">参赛策略</h1>
      <p class="page-subtitle">从选奖策略到材料准备，专业团队分享200+成功案例经验</p>
    </div>
  </section>

  <!-- Filter -->
  <section class="filter-section">
    <div class="container">
      <div class="filter-bar">
        <span class="filter-label">分类筛选：</span>
        <button class="filter-btn active" data-filter="all">全部</button>
        <button class="filter-btn" data-filter="beginner">新手入门</button>
        <button class="filter-btn" data-filter="selection">选奖指南</button>
        <button class="filter-btn" data-filter="material">材料准备</button>
        <button class="filter-btn" data-filter="tips">获奖技巧</button>
      </div>
    </div>
  </section>

  <!-- Articles -->
  <section class="section">
    <div class="container">
      <div class="article-grid" id="articleGrid">
        <!-- 内容将通过JS动态加载 -->
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <div>
          <div class="footer-logo">设计能</div>
          <p class="footer-desc">国际设计大奖一站式申报平台，收录100+国际奖项，218项结构化数据，专业代理申报服务。</p>
        </div>
        <div>
          <h4 class="footer-title">奖项库</h4>
          <ul class="footer-links">
            <li><a href="index.html#awards">全部奖项</a></li>
            <li><a href="muse-detail.html">MUSE设计奖</a></li>
            <li><a href="compare.html">奖项对比</a></li>
          </ul>
        </div>
        <div>
          <h4 class="footer-title">内容</h4>
          <ul class="footer-links">
            <li><a href="cases.html">成功案例</a></li>
            <li><a href="strategies.html">参赛策略</a></li>
            <li><a href="news.html">赛事新闻</a></li>
          </ul>
        </div>
        <div>
          <h4 class="footer-title">联系</h4>
          <ul class="footer-links">
            <li><a href="index.html#contact">免费咨询</a></li>
            <li><a href="index.html#services">申报服务</a></li>
          </ul>
        </div>
      </div>
      <div class="footer-bottom">
        <p>© 2026 设计能—国际设计大奖申报指南 | www.52de.cc</p>
      </div>
    </div>
  </footer>

  <script>
    // 加载策略文章数据
    async function loadStrategies() {
      try {
        const response = await fetch('../../data/strategies-index.json');
        const data = await response.json();
        
        renderArticles(data.articles);
      } catch (error) {
        console.error('加载策略文章失败:', error);
        document.getElementById('articleGrid').innerHTML = `
          <div class="empty-state" style="grid-column: span 2;">
            <div class="empty-state-icon">📄</div>
            <p>暂无文章数据</p>
          </div>
        `;
      }
    }
    
    // 渲染文章列表
    function renderArticles(articles) {
      const container = document.getElementById('articleGrid');
      
      // 分离精选文章和普通文章
      const featured = articles.filter(a => a.is_featured);
      const normal = articles.filter(a => !a.is_featured);
      
      let html = '';
      
      // 渲染精选文章（第一个精选文章大图展示）
      if (featured.length > 0) {
        const firstFeatured = featured[0];
        html += `
          <div class="featured-article" data-category="${firstFeatured.category}">
            <div class="article-image">
              文章配图
              <span class="article-category">${firstFeatured.category_name}</span>
            </div>
            <div class="article-content">
              <span class="featured-label">⭐ 精选必读</span>
              <div class="article-meta">
                <span>📅 ${firstFeatured.published_at}</span>
                <span>⏱️ ${firstFeatured.read_time}分钟</span>
                <span class="difficulty-badge difficulty-${firstFeatured.difficulty === '初级' ? 'easy' : firstFeatured.difficulty === '中级' ? 'medium' : 'hard'}">${firstFeatured.difficulty_label}</span>
              </div>
              <h3 class="article-title">${firstFeatured.title}</h3>
              <p class="article-summary">${firstFeatured.summary}</p>
              <div class="article-footer">
                <div class="article-tags">
                  ${firstFeatured.tags.map(tag => `<span class="article-tag">${tag}</span>`).join('')}
                </div>
                <a href="${firstFeatured.detail_url}" class="article-link">阅读全文 →</a>
              </div>
            </div>
          </div>
        `;
      }
      
      // 渲染普通文章
      html += normal.map(article => `
        <div class="article-card" data-category="${article.category}">
          <div class="article-image">
            文章配图
            <span class="article-category">${article.category_name}</span>
          </div>
          <div class="article-content">
            <div class="article-meta">
              <span>📅 ${article.published_at}</span>
              <span>⏱️ ${article.read_time}分钟</span>
              <span class="difficulty-badge difficulty-${article.difficulty === '初级' ? 'easy' : article.difficulty === '中级' ? 'medium' : 'hard'}">${article.difficulty_label}</span>
            </div>
            <h3 class="article-title">${article.title}</h3>
            <p class="article-summary">${article.summary}</p>
            <div class="article-footer">
              <div class="article-tags">
                ${article.tags.slice(0, 2).map(tag => `<span class="article-tag">${tag}</span>`).join('')}
              </div>
              <a href="${article.detail_url}" class="article-link">阅读全文 →</a>
            </div>
          </div>
        </div>
      `).join('');
      
      container.innerHTML = html;
    }
    
    // 筛选功能
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        // 更新激活状态
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const filter = btn.dataset.filter;
        
        // 筛选文章
        document.querySelectorAll('.article-card, .featured-article').forEach(card => {
          if (filter === 'all' || card.dataset.category === filter) {
            card.style.display = card.classList.contains('featured-article') ? 'grid' : 'block';
          } else {
            card.style.display = 'none';
          }
        });
      });
    });
    
    // 页面加载时获取数据
    loadStrategies();
  </script>
</body>
</html>
