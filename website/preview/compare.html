  <style>
    :root {
      --primary-gold: #B8860B;
      --primary-gold-light: #D4AF37;
      --bg-dark: #1A1A1A;
      --bg-darker: #0F0F0F;
      --bg-gray: #2C2C2C;
      --bg-content: #252525;
      --bg-card: #1E1E1E;
      --text-light: #FAF9F6;
      --text-gray: #AAAAAA;
      --border-gold: rgba(184, 134, 11, 0.3);
      --border-gray: rgba(255, 255, 255, 0.1);
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    html {
      scroll-behavior: smooth;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background-color: var(--bg-darker);
      color: #FAF9F6;
      line-height: 1.6;
    }
    
    /* Header */
    .header {
      background-color: rgba(26, 26, 26, 0.95);
      backdrop-filter: blur(10px);
      padding: 16px 0;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--border-gold);
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 24px;
    }
    
    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .logo {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }
    
    .logo-text {
      font-size: 28px;
      font-weight: bold;
      color: #D4AF37;
      letter-spacing: 2px;
    }
    
    .logo-sub {
      font-size: 13px;
      color: #AAAAAA;
    }
    
    .nav {
      display: flex;
      gap: 32px;
    }
    
    .nav-link {
      color: #FAF9F6;
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
    }
    
    .nav-link:hover {
      color: #D4AF37;
    }
    
    /* Page Header */
    .page-header {
      background: linear-gradient(135deg, rgba(184, 134, 11, 0.1) 0%, rgba(26, 26, 26, 0) 100%);
      padding: 60px 0 40px;
      border-bottom: 1px solid var(--border-gold);
    }
    
    .page-title {
      font-size: 36px;
      font-weight: bold;
      color: #FAF9F6;
      margin-bottom: 12px;
    }
    
    .page-desc {
      font-size: 16px;
      color: #888;
      max-width: 600px;
    }
    
    /* Main Layout */
    .main-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 32px;
      padding: 40px 0;
    }
    
    /* Sidebar - Award Selector */
    .sidebar {
      background-color: var(--bg-content);
      border-radius: 12px;
      padding: 24px;
      height: fit-content;
      position: sticky;
      top: 100px;
      border: 1px solid var(--border-gray);
    }
    
    .sidebar-title {
      font-size: 16px;
      font-weight: bold;
      color: #D4AF37;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-gold);
    }
    
    .award-selector {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .award-checkbox {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      background-color: var(--bg-card);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
    }
    
    .award-checkbox:hover {
      border-color: var(--border-gold);
    }
    
    .award-checkbox input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #D4AF37;
      cursor: pointer;
    }
    
    .award-checkbox-label {
      flex: 1;
      font-size: 14px;
      color: #FAF9F6;
      cursor: pointer;
    }
    
    .award-checkbox-count {
      font-size: 12px;
      color: #666;
    }
    
    .compare-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #B8860B 0%, #D4AF37 100%);
      color: #1A1A1A;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
      transition: opacity 0.2s;
    }
    
    .compare-btn:hover {
      opacity: 0.9;
    }
    
    .compare-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    /* Filter Tags */
    .filter-section {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--border-gray);
    }
    
    .filter-title {
      font-size: 14px;
      font-weight: bold;
      color: #888;
      margin-bottom: 12px;
    }
    
    .filter-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    
    .filter-tag {
      padding: 6px 12px;
      background-color: var(--bg-card);
      border: 1px solid var(--border-gray);
      border-radius: 20px;
      font-size: 12px;
      color: #AAA;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .filter-tag:hover,
    .filter-tag.active {
      background-color: rgba(212, 175, 55, 0.15);
      border-color: var(--border-gold);
      color: #D4AF37;
    }
    
    /* Comparison Table */
    .comparison-area {
      background-color: var(--bg-content);
      border-radius: 12px;
      padding: 32px;
      border: 1px solid var(--border-gray);
    }
    
    .comparison-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    
    .comparison-title {
      font-size: 20px;
      font-weight: bold;
      color: #FAF9F6;
    }
    
    .comparison-actions {
      display: flex;
      gap: 12px;
    }
    
    .action-btn {
      padding: 8px 16px;
      background-color: var(--bg-card);
      border: 1px solid var(--border-gray);
      border-radius: 6px;
      font-size: 13px;
      color: #AAA;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .action-btn:hover {
      border-color: var(--border-gold);
      color: #D4AF37;
    }
    
    /* Table Styles */
    .comparison-table-wrapper {
      overflow-x: auto;
    }
    
    .comparison-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    
    .comparison-table th,
    .comparison-table td {
      padding: 16px;
      text-align: left;
      border-bottom: 1px solid var(--border-gray);
    }
    
    .comparison-table th {
      background-color: var(--bg-card);
      font-weight: 600;
      color: #D4AF37;
      position: sticky;
      top: 0;
      min-width: 160px;
    }
    
    .comparison-table th:first-child {
      width: 200px;
      color: #888;
      font-weight: normal;
    }
    
    .comparison-table td {
      color: #FAF9F6;
      vertical-align: top;
    }
    
    .comparison-table tr:hover td {
      background-color: rgba(255, 255, 255, 0.02);
    }
    
    .award-name-cell {
      font-weight: bold;
      color: #D4AF37;
    }
    
    .award-org {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }
    
    .highlight {
      color: #D4AF37;
      font-weight: 600;
    }
    
    .badge {
      display: inline-block;
      padding: 2px 8px;
      background-color: rgba(212, 175, 55, 0.15);
      border: 1px solid var(--border-gold);
      border-radius: 4px;
      font-size: 11px;
      color: #D4AF37;
      margin-right: 4px;
    }
    
    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 80px 40px;
    }
    
    .empty-icon {
      font-size: 64px;
      margin-bottom: 20px;
      opacity: 0.5;
    }
    
    .empty-title {
      font-size: 20px;
      color: #FAF9F6;
      margin-bottom: 12px;
    }
    
    .empty-desc {
      font-size: 14px;
      color: #666;
    }
    
    /* Footer */
    .footer {
      background-color: var(--bg-dark);
      padding: 40px 0;
      border-top: 1px solid var(--border-gray);
      margin-top: 60px;
    }
    
    .footer-text {
      text-align: center;
      font-size: 13px;
      color: #666;
    }
    
    /* Responsive */
    @media (max-width: 1024px) {
      .main-layout {
        grid-template-columns: 1fr;
      }
      
      .sidebar {
        position: static;
      }
      
      .award-selector {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
      }
    }
    
    @media (max-width: 768px) {
      .page-title {
        font-size: 28px;
      }
      
      .award-selector {
        grid-template-columns: 1fr;
      }
      
      .comparison-area {
        padding: 20px;
      }
      
      .comparison-table th,
      .comparison-table td {
        padding: 12px;
        font-size: 13px;
      }
      
      .nav {
        display: none;
      }
    }
  </style>
</head>

  <script>
    // Award Data
    const awardData = {
      muse: {
        name: 'MUSE设计奖',
        nameEn: 'MUSE Design Awards',
        org: '国际奖项协会(IAA)',
        country: '美国',

        org: 'D&AD英国',
        country: '英国',
        region: 'uk',
        categories: ['graphic', 'product', 'digital'],
        feeEarly: '£295',
        feeRegular: '£395',
        feeCategory: 'medium',
        deadlineEarly: '2026.03.15',
        deadlineRegular: '2026.04.15',
        levels: '黑铅笔/黄铅笔/石墨铅笔/木铅笔',
        images: '按类别要求',
        resolution: '300dpi',
        video: '部分类别需要',
        language: '英文',
        announcement: '2026年5月',
        website: 'dandad.com'
      },
      riba: {
        name: 'RIBA国际奖',
        nameEn: 'RIBA International Awards',
        org: '英国皇家建筑师学会',
        country: '英国',
        region: 'uk',
        categories: ['architecture'],
        feeEarly: '£350',
        feeRegular: '£450',
        feeCategory: 'medium',
        deadlineEarly: '2025.10.01',
        deadlineRegular: '2025.11.01',
        levels: '国际奖/新兴建筑师奖',
        images: '10-20张',
        resolution: '300dpi',
        video: '推荐提交',
        language: '英文',
        announcement: '2026年6月',
        website: 'riba.com'
      },
      titan: {
        name: 'TITAN地产奖',
        nameEn: 'TITAN Property Awards',
        org: '国际奖项协会(IAA)',
        country: '美国',
        region: 'us',
        categories: ['architecture', 'interior'],
        feeEarly: '$220',
        feeRegular: '$270',
        feeCategory: 'low',
        deadlineEarly: '2025.12.18',
        deadlineRegular: '2026.01.17',
        levels: '铂金奖/金奖/银奖',
        images: '5-10张',
        resolution: '1920×1080起',
        video: '可选',
        language: '英文',
        announcement: '2026年3月',
        website: 'titanpropertyawards.com'
      },
      ida: {
        name: 'IDA设计奖',
        nameEn: 'International Design Awards',
        org: 'Farmani集团',
        country: '美国',
        region: 'us',
        categories: ['architecture', 'interior', 'product', 'graphic'],
        feeEarly: '$250',
        feeRegular: '$350',
        feeCategory: 'medium',
        deadlineEarly: '2025.11.30',
        deadlineRegular: '2025.12.31',
        levels: '年度设计奖/金奖/银奖/铜奖',
        images: '5-10张',
        resolution: '2000px以上',
        video: '可选',
        language: '英文',
        announcement: '2026年2月',
        website: 'idesignawards.com'
      },
      'red-dot': {
        name: '红点设计奖',
        nameEn: 'Red Dot Award',
        org: '德国设计协会',
        country: '德国',
        region: 'eu',
        categories: ['product', 'communication', 'design-concept'],
        feeEarly: '€399',
        feeRegular: '€499',
        feeCategory: 'high',
        deadlineEarly: '2025.12.15',
        deadlineRegular: '2026.01.15',
        levels: '最佳设计奖/红点奖',
        images: '按类别要求',
        resolution: '300dpi',
        video: '部分类别需要',
        language: '英文/德文',
        announcement: '2026年4月',
        website: 'red-dot.org'
      }
    };

    // State
    let selectedAwards = [];
    let activeCategoryFilter = 'all';
    let activeFeeFilter = 'all';
    let activeRegionFilter = 'all';

    // DOM Elements
    const awardSelector = document.getElementById('awardSelector');
    const compareBtn = document.getElementById('compareBtn');
    const comparisonResult = document.getElementById('comparisonResult');

    // Event Listeners
    awardSelector.addEventListener('change', (e) => {
      if (e.target.type === 'checkbox') {
        updateSelection();
      }
    });

    compareBtn.addEventListener('click', renderComparison);

    // Filter Tags
    document.querySelectorAll('.filter-tag[data-filter]').forEach(tag => {
      tag.addEventListener('click', () => {
        document.querySelectorAll('.filter-tag[data-filter]').forEach(t => t.classList.remove('active'));
        tag.classList.add('active');
        activeCategoryFilter = tag.dataset.filter;
        filterAwards();
      });
    });

    document.querySelectorAll('.filter-tag[data-filter-fee]').forEach(tag => {
      tag.addEventListener('click', () => {
        document.querySelectorAll('.filter-tag[data-filter-fee]').forEach(t => t.classList.remove('active'));
        tag.classList.add('active');
        activeFeeFilter = tag.dataset.filterFee;
        filterAwards();
      });
    });

    document.querySelectorAll('.filter-tag[data-filter-region]').forEach(tag => {
      tag.addEventListener('click', () => {
        document.querySelectorAll('.filter-tag[data-filter-region]').forEach(t => t.classList.remove('active'));
        tag.classList.add('active');
        activeRegionFilter = tag.dataset.filterRegion;
        filterAwards();
      });
    });

    function updateSelection() {
      const checkboxes = awardSelector.querySelectorAll('input[type="checkbox"]:checked');
      selectedAwards = Array.from(checkboxes).map(cb => cb.value);
      
      if (selectedAwards.length >= 2 && selectedAwards.length <= 4) {
        compareBtn.disabled = false;
        compareBtn.textContent = `开始对比（已选${selectedAwards.length}个）`;
      } else if (selectedAwards.length > 4) {
        compareBtn.disabled = true;
        compareBtn.textContent = '最多选择4个奖项';
      } else {
        compareBtn.disabled = true;
        compareBtn.textContent = '开始对比（请选择2-4个奖项）';
      }
    }

    function filterAwards() {
      const checkboxes = awardSelector.querySelectorAll('.award-checkbox');
      
      checkboxes.forEach(checkbox => {
        const input = checkbox.querySelector('input');
        const awardKey = input.value;
        const award = awardData[awardKey];
        
        let visible = true;
        
        // Category filter
        if (activeCategoryFilter !== 'all') {
          visible = visible && award.categories.includes(activeCategoryFilter);
        }
        
        // Fee filter
        if (activeFeeFilter !== 'all') {
          visible = visible && award.feeCategory === activeFeeFilter;
        }
        
        // Region filter
        if (activeRegionFilter !== 'all') {
          visible = visible && award.region === activeRegionFilter;
        }
        
        checkbox.style.display = visible ? 'flex' : 'none';
      });
    }

    function renderComparison() {
      if (selectedAwards.length < 2) return;
      
      const awards = selectedAwards.map(key => awardData[key]);
      
      const rows = [
        { label: '奖项名称', key: 'name', highlight: true },
        { label: '主办方', key: 'org' },
        { label: '国家/地区', key: 'country' },
        { label: '早鸟费用', key: 'feeEarly', highlight: true },
        { label: '常规费用', key: 'feeRegular' },
        { label: '早鸟截止', key: 'deadlineEarly', highlight: true },
        { label: '常规截止', key: 'deadlineRegular' },
        { label: '奖项等级', key: 'levels' },
        { label: '图片要求', key: 'images' },
        { label: '分辨率要求', key: 'resolution' },
        { label: '视频要求', key: 'video' },
        { label: '语言要求', key: 'language' },
        { label: '结果公布', key: 'announcement' },
        { label: '官网', key: 'website' }
      ];
      
      let html = '<table class="comparison-table"><thead><tr><th>对比项目</th>';
      awards.forEach(award => {
        html += `<th><div class="award-name-cell">${award.name}</div><div class="award-org">${award.org}</div></th>`;
      });
      html += '</tr></thead><tbody>';
      
      rows.forEach(row => {
        html += `<tr><td>${row.label}</td>`;
        awards.forEach(award => {
          const value = award[row.key];
          const className = row.highlight ? 'highlight' : '';
          html += `<td class="${className}">${value}</td>`;
        });
        html += '</tr>';
      });
      
      html += '</tbody></table>';
      
      comparisonResult.innerHTML = html;
    }

    function clearComparison() {
      selectedAwards = [];
      awardSelector.querySelectorAll('input[type="checkbox"]').forEach(cb => {
        cb.checked = false;
      });
      updateSelection();
      comparisonResult.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📊</div>
          <h3 class="empty-title">请选择要对比的奖项</h3>
          <p class="empty-desc">在左侧选择2-4个奖项，点击"开始对比"查看详细对比结果</p>
        </div>
      `;
    }

    function exportComparison() {
      if (selectedAwards.length < 2) {
        alert('请先选择奖项进行对比');
        return;
      }
      
      let text = '国际设计大奖对比结果\n设计能 - www.52de.cc\n\n';
      const awards = selectedAwards.map(key => awardData[key]);
      
      text += '奖项名称: ' + awards.map(a => a.name).join(' | ') + '\n';
      text += '主办方: ' + awards.map(a => a.org).join(' | ') + '\n';
      text += '早鸟费用: ' + awards.map(a => a.feeEarly).join(' | ') + '\n';
      text += '早鸟截止: ' + awards.map(a => a.deadlineEarly).join(' | ') + '\n';
      text += '奖项等级: ' + awards.map(a => a.levels).join(' | ') + '\n';
      
      const blob = new Blob([text], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = '奖项对比结果.txt';
      a.click();
      URL.revokeObjectURL(url);
    }

    // Initialize
    document.querySelector('.filter-tag[data-filter="all"]').classList.add('active');
    document.querySelector('.filter-tag[data-filter-fee="all"]').classList.add('active');
    document.querySelector('.filter-tag[data-filter-region="all"]').classList.add('active');
  </script>
</body>
</html>
