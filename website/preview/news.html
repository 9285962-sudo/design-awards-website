<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>赛事新闻 | 设计能—国际设计大奖申报指南</title>
  <meta name="description" content="国际设计大奖最新动态，奖项申报截止日期、获奖公布、行业趋势等实时资讯，助你把握申报时机。">
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary-gold: #B8860B;
      --primary-gold-light: #D4AF37;
      --bg-dark: #1A1A1A;
      --bg-darker: #0F0F0F;
      --bg-gray: #2C2C2C;
      --text-light: #FAF9F6;
      --text-gray: #AAAAAA;
      --border-gold: rgba(184, 134, 11, 0.3);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
      background-color: var(--bg-darker);
      color: #FAF9F6;
      line-height: 1.6;
    }
    .header {
      background-color: rgba(26, 26, 26, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border-gold);
      padding: 16px 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
    .header-content { display: flex; justify-content: space-between; align-items: center; }
    .logo { display: flex; align-items: baseline; gap: 12px; text-decoration: none; }
    .logo-text { font-size: 24px; font-weight: bold; color: #D4AF37; }
    .logo-sub { font-size: 13px; color: #888; }
    .nav { display: flex; gap: 32px; }
    .nav a { color: #AAAAAA; text-decoration: none; font-size: 14px; transition: color 0.2s; }
    .nav a:hover, .nav a.active { color: #D4AF37; }
    .page-header {
      background: linear-gradient(135deg, rgba(212, 175, 55, 0.1) 0%, rgba(184, 134, 11, 0.05) 100%);
      border-bottom: 1px solid var(--border-gold);
      padding: 60px 0;
      text-align: center;
    }
    .page-label { color: #D4AF37; font-size: 14px; letter-spacing: 2px; margin-bottom: 12px; }
    .page-title { font-size: 36px; font-weight: bold; color: #FAF9F6; margin-bottom: 12px; }
    .page-subtitle { font-size: 16px; color: #888; }
    .filter-section { background-color: var(--bg-gray); border-bottom: 1px solid #333; padding: 24px 0; }
    .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .filter-label { font-size: 14px; color: #888; margin-right: 8px; }
    .filter-btn {
      padding: 8px 16px; background-color: var(--bg-dark); border: 1px solid #444;
      border-radius: 20px; font-size: 13px; color: #AAA; cursor: pointer; transition: all 0.2s;
    }
    .filter-btn:hover { border-color: var(--border-gold); color: #D4AF37; }
    .filter-btn.active { background-color: rgba(212, 175, 55, 0.15); border-color: #D4AF37; color: #D4AF37; }
    .section { padding: 60px 0; }
    .news-list { max-width: 900px; margin: 0 auto; }
    .news-item {
      background-color: var(--bg-gray); border: 1px solid #333;
      border-radius: 12px; padding: 24px; margin-bottom: 20px;
      transition: border-color 0.2s; position: relative;
    }
    .news-item:hover { border-color: var(--border-gold); }
    .news-item.urgent { border-left: 4px solid #F44336; }
    .news-item.featured { border-left: 4px solid #D4AF37; }
    .news-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
    .news-category {
      padding: 4px 12px; border-radius: 4px; font-size: 12px; font-weight: 500;
    }
    .news-category.deadline { background-color: rgba(244, 67, 54, 0.15); color: #F44336; }
    .news-category.announcement { background-color: rgba(76, 175, 80, 0.15); color: #4CAF50; }
    .news-category.industry { background-color: rgba(33, 150, 243, 0.15); color: #2196F3; }
    .news-category.policy { background-color: rgba(156, 39, 176, 0.15); color: #9C27B0; }
    .news-date { font-size: 13px; color: #888; }
    .news-title { font-size: 18px; font-weight: bold; color: #FAF9F6; margin-bottom: 8px; line-height: 1.4; }
    .news-summary { font-size: 14px; color: #888; line-height: 1.6; margin-bottom: 16px; }
    .news-footer { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
    .news-source { font-size: 13px; color: #666; }
    .news-source a { color: #888; text-decoration: none; }
    .news-source a:hover { color: #D4AF37; }
    .news-link { color: #D4AF37; text-decoration: none; font-size: 14px; }
    .news-link:hover { text-decoration: underline; }
    .urgent-badge {
      display: inline-flex; align-items: center; gap: 4px;
      background-color: rgba(244, 67, 54, 0.15); color: #F44336;
      padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: 500;
    }
    .empty-state { text-align: center; padding: 80px 0; color: #666; }
    .footer { background-color: #0F0F0F; padding: 60px 0 32px; border-top: 1px solid var(--border-gold); }
    .footer-content { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 40px; margin-bottom: 40px; }
    .footer-logo { font-size: 24px; font-weight: bold; color: #D4AF37; margin-bottom: 16px; }
    .footer-desc { font-size: 14px; color: #888; line-height: 1.6; }
    .footer-title { font-size: 14px; font-weight: bold; color: #FAF9F6; margin-bottom: 16px; }
    .footer-links { list-style: none; }
    .footer-links li { margin-bottom: 10px; }
    .footer-links a { color: #888; text-decoration: none; font-size: 14px; transition: color 0.2s; }
    .footer-links a:hover { color: #D4AF37; }
    .footer-bottom { text-align: center; padding-top: 32px; border-top: 1px solid #333; font-size: 13px; color: #666; }
    @media (max-width: 768px) {
      .nav { display: none; }
      .page-title { font-size: 28px; }
      .footer-content { grid-template-columns: 1fr; text-align: center; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="header-content">
        <a href="index.html" class="logo">
          <span class="logo-text">设计能</span>
          <span class="logo-sub">国际设计大奖申报指南</span>
        </a>
        <nav class="nav">
          <a href="index.html">首页</a>
          <a href="index.html#awards">奖项库</a>
          <a href="compare.html">奖项对比</a>
          <a href="cases.html">成功案例</a>
          <a href="strategies.html">参赛策略</a>
          <a href="news.html" class="active">赛事新闻</a>
          <a href="index.html#contact">联系我们</a>
        </nav>
      </div>
    </div>
  </header>

  <section class="page-header">
    <div class="container">
      <div class="page-label">News</div>
      <h1 class="page-title">赛事新闻</h1>
      <p class="page-subtitle">国际设计大奖最新动态，把握申报时机</p>
    </div>
  </section>

  <section class="filter-section">
    <div class="container">
      <div class="filter-bar">
        <span class="filter-label">分类筛选：</span>
        <button class="filter-btn active" data-filter="all">全部</button>
        <button class="filter-btn" data-filter="deadline">截止日期</button>
        <button class="filter-btn" data-filter="announcement">获奖公布</button>
        <button class="filter-btn" data-filter="industry">行业动态</button>
        <button class="filter-btn" data-filter="policy">政策变化</button>
      </div>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="news-list" id="newsList"></div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <div>
          <div class="footer-logo">设计能</div>
          <p class="footer-desc">国际设计大奖一站式申报平台，收录100+国际奖项，218项结构化数据，专业代理申报服务。</p>
        </div>
        <div>
          <h4 class="footer-title">奖项库</h4>
          <ul class="footer-links">
            <li><a href="index.html#awards">全部奖项</a></li>
            <li><a href="muse-detail.html">MUSE设计奖</a></li>
            <li><a href="compare.html">奖项对比</a></li>
          </ul>
        </div>
        <div>
          <h4 class="footer-title">内容</h4>
          <ul class="footer-links">
            <li><a href="cases.html">成功案例</a></li>
            <li><a href="strategies.html">参赛策略</a></li>
            <li><a href="news.html">赛事新闻</a></li>
          </ul>
        </div>
        <div>
          <h4 class="footer-title">联系</h4>
          <ul class="footer-links">
            <li><a href="index.html#contact">免费咨询</a></li>
            <li><a href="index.html#services">申报服务</a></li>
          </ul>
        </div>
      </div>
      <div class="footer-bottom">
        <p>© 2026 设计能—国际设计大奖申报指南 | www.52de.cc</p>
      </div>
    </div>
  </footer>

  <script>
    async function loadNews() {
      try {
        const response = await fetch('../../data/news-index.json');
        const data = await response.json();
        renderNews(data.news);
      } catch (error) {
        console.error('加载新闻失败:', error);
        document.getElementById('newsList').innerHTML = '<div class="empty-state"><p>暂无新闻数据</p></div>';
      }
    }
    
    function renderNews(news) {
      const container = document.getElementById('newsList');
      container.innerHTML = news.map(item => `
        <div class="news-item ${item.is_urgent ? 'urgent' : ''} ${item.is_featured ? 'featured' : ''}" data-category="${item.category}">
          <div class="news-header">
            <span class="news-category ${item.category}">${item.category_name}</span>
            <span class="news-date">${item.published_at}</span>
          </div>
          <h3 class="news-title">${item.is_urgent ? '<span class="urgent-badge">🔥 紧急</span> ' : ''}${item.title}</h3>
          <p class="news-summary">${item.summary}</p>
          <div class="news-footer">
            <span class="news-source">来源：<a href="${item.source_url}" target="_blank">${item.source}</a></span>
            <a href="${item.detail_url}" class="news-link">查看详情 →</a>
          </div>
        </div>
      `).join('');
    }
    
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filter = btn.dataset.filter;
        document.querySelectorAll('.news-item').forEach(item => {
          item.style.display = (filter === 'all' || item.dataset.category === filter) ? 'block' : 'none';
        });
      });
    });
    
    loadNews();
  </script>
</body>
</html>
